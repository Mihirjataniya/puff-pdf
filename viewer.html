<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Puff PDF</title>
  <link rel="stylesheet" href="viewer.css" />
</head>
<body>
  <!-- icon sprite -->
  <svg width="0" height="0" style="position:absolute" aria-hidden="true">
    <defs>
      <symbol id="i-open" viewBox="0 0 24 24"><path d="m6 14 1.5-2.9A2 2 0 0 1 9.24 10H20a2 2 0 0 1 1.94 2.5l-1.54 6a2 2 0 0 1-1.95 1.5H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h3.9a2 2 0 0 1 1.69.9l.81 1.2a2 2 0 0 0 1.67.9H18a2 2 0 0 1 2 2v2" /></symbol>
      <symbol id="i-save" viewBox="0 0 24 24"><path d="M15.2 3a2 2 0 0 1 1.4.6l3.8 3.8a2 2 0 0 1 .6 1.4V19a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2z" /> <path d="M17 21v-7a1 1 0 0 0-1-1H8a1 1 0 0 0-1 1v7" /> <path d="M7 3v4a1 1 0 0 0 1 1h7" /></symbol>
      <symbol id="i-export" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" /> <polyline points="7 10 12 15 17 10" /> <line x1="12" x2="12" y1="15" y2="3" /></symbol>
      <symbol id="i-ocr" viewBox="0 0 24 24"><path d="M3 7V5a2 2 0 0 1 2-2h2" /> <path d="M17 3h2a2 2 0 0 1 2 2v2" /> <path d="M21 17v2a2 2 0 0 1-2 2h-2" /> <path d="M7 21H5a2 2 0 0 1-2-2v-2" /> <path d="M7 8h8" /> <path d="M7 12h10" /> <path d="M7 16h6" /></symbol>
      <symbol id="i-undo" viewBox="0 0 24 24"><path d="M9 14 4 9l5-5" /> <path d="M4 9h10.5a5.5 5.5 0 0 1 5.5 5.5a5.5 5.5 0 0 1-5.5 5.5H11" /></symbol>
      <symbol id="i-redo" viewBox="0 0 24 24"><path d="m15 14 5-5-5-5" /> <path d="M20 9H9.5A5.5 5.5 0 0 0 4 14.5A5.5 5.5 0 0 0 9.5 20H13" /></symbol>
      <symbol id="i-trash" viewBox="0 0 24 24"><path d="M3 6h18" /> <path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6" /> <path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2" /> <line x1="10" x2="10" y1="11" y2="17" /> <line x1="14" x2="14" y1="11" y2="17" /></symbol>
      <symbol id="i-zoom-in" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8" /> <line x1="21" x2="16.65" y1="21" y2="16.65" /> <line x1="11" x2="11" y1="8" y2="14" /> <line x1="8" x2="14" y1="11" y2="11" /></symbol>
      <symbol id="i-zoom-out" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8" /> <line x1="21" x2="16.65" y1="21" y2="16.65" /> <line x1="8" x2="14" y1="11" y2="11" /></symbol>
      <symbol id="i-fit" viewBox="0 0 24 24"><path d="M8 3H5a2 2 0 0 0-2 2v3" /> <path d="M21 8V5a2 2 0 0 0-2-2h-3" /> <path d="M3 16v3a2 2 0 0 0 2 2h3" /> <path d="M16 21h3a2 2 0 0 0 2-2v-3" /></symbol>

      <symbol id="i-select" viewBox="0 0 24 24"><path d="M4.037 4.688a.495.495 0 0 1 .651-.651l16 6.5a.5.5 0 0 1-.063.947l-6.124 1.58a2 2 0 0 0-1.438 1.435l-1.579 6.126a.5.5 0 0 1-.947.063z" /></symbol>
      <symbol id="i-pen" viewBox="0 0 24 24"><path d="M21.174 6.812a1 1 0 0 0-3.986-3.987L3.842 16.174a2 2 0 0 0-.5.83l-1.321 4.352a.5.5 0 0 0 .623.622l4.353-1.32a2 2 0 0 0 .83-.497z" /></symbol>
      <symbol id="i-brush" viewBox="0 0 24 24"><path d="m14.622 17.897-10.68-2.913" /> <path d="M18.376 2.622a1 1 0 1 1 3.002 3.002L17.36 9.643a.5.5 0 0 0 0 .707l.944.944a2.41 2.41 0 0 1 0 3.408l-.944.944a.5.5 0 0 1-.707 0L8.354 7.348a.5.5 0 0 1 0-.707l.944-.944a2.41 2.41 0 0 1 3.408 0l.944.944a.5.5 0 0 0 .707 0z" /> <path d="M9 8c-1.804 2.71-3.97 3.46-6.583 3.948a.507.507 0 0 0-.302.819l7.32 8.883a1 1 0 0 0 1.185.204C12.735 20.405 16 16.792 16 15" /></symbol>
      <symbol id="i-hltext" viewBox="0 0 24 24"><path d="m9 11-6 6v3h9l3-3" /> <path d="m22 12-4.6 4.6a2 2 0 0 1-2.8 0l-5.2-5.2a2 2 0 0 1 0-2.8L14 4" /></symbol>
      <symbol id="i-hlfree" viewBox="0 0 24 24"><path d="m9.06 11.9 8.07-8.06a2.85 2.85 0 1 1 4.03 4.03l-8.06 8.08" /> <path d="M7.07 14.94c-1.66 0-3 1.35-3 3.02 0 1.33-2.5 1.52-2 2.02 1.08 1.1 2.49 2.02 4 2.02 2.2 0 4-1.8 4-4.04a3.01 3.01 0 0 0-3-3.02z" /></symbol>
      <symbol id="i-line" viewBox="0 0 24 24"><path d="M5 19L19 5"/></symbol>
      <symbol id="i-arrow" viewBox="0 0 24 24"><path d="M5 19L19 5"/><path d="M19 5h-6"/><path d="M19 5v6"/></symbol>
      <symbol id="i-rect" viewBox="0 0 24 24"><rect x="4" y="6" width="16" height="12" rx="1.5"/></symbol>
      <symbol id="i-ellipse" viewBox="0 0 24 24"><ellipse cx="12" cy="12" rx="9" ry="6.5"/></symbol>
      <symbol id="i-text" viewBox="0 0 24 24"><polyline points="4 7 4 4 20 4 20 7" /> <line x1="9" x2="15" y1="20" y2="20" /> <line x1="12" x2="12" y1="4" y2="20" /></symbol>
      <symbol id="i-eraser" viewBox="0 0 24 24"><path d="m7 21-4.3-4.3c-1-1-1-2.5 0-3.4l9.6-9.6c1-1 2.5-1 3.4 0l5.6 5.6c1 1 1 2.5 0 3.4L13 21" /> <path d="M22 21H7" /> <path d="m5 11 9 9" /></symbol>

      <symbol id="i-dblarrow" viewBox="0 0 24 24"><path d="M3 12h18"/><path d="M3 12l4-4M3 12l4 4"/><path d="M21 12l-4-4M21 12l-4 4"/></symbol>
      <symbol id="i-rrect" viewBox="0 0 24 24"><rect x="4" y="6" width="16" height="12" rx="4"/></symbol>
      <symbol id="i-triangle" viewBox="0 0 24 24"><polygon points="12,4 20,20 4,20"/></symbol>
      <symbol id="i-righttri" viewBox="0 0 24 24"><polygon points="5,4 5,20 20,20"/></symbol>
      <symbol id="i-diamond" viewBox="0 0 24 24"><polygon points="12,3 21,12 12,21 3,12"/></symbol>
      <symbol id="i-pentagon" viewBox="0 0 24 24"><polygon points="12,3 21,10 17,21 7,21 3,10"/></symbol>
      <symbol id="i-hexagon" viewBox="0 0 24 24"><polygon points="7,4 17,4 22,12 17,20 7,20 2,12"/></symbol>
      <symbol id="i-star" viewBox="0 0 24 24"><polygon points="12,3 14.6,9 21,9 15.7,13 17.7,20 12,16 6.3,20 8.3,13 3,9 9.4,9"/></symbol>
      <symbol id="i-plus" viewBox="0 0 24 24"><polygon points="9,3 15,3 15,9 21,9 21,15 15,15 15,21 9,21 9,15 3,15 3,9 9,9"/></symbol>
      <symbol id="i-parallelogram" viewBox="0 0 24 24"><polygon points="8,5 21,5 16,19 3,19"/></symbol>
      <symbol id="i-trapezoid" viewBox="0 0 24 24"><polygon points="7,5 17,5 21,19 3,19"/></symbol>
      <symbol id="i-elbowarrow" viewBox="0 0 24 24"><path d="M5 4v11h11"/><path d="M13 12l3 3-3 3"/></symbol>
      <symbol id="i-curvedarrow" viewBox="0 0 24 24"><path d="M4 19 Q7 6 18 8"/><path d="M14 5l4 3-3 4"/></symbol>
      <symbol id="i-heart" viewBox="0 0 24 24"><path d="M12 20s-7-4.5-7-10a4 4 0 0 1 7-2.6A4 4 0 0 1 19 10c0 5.5-7 10-7 10z"/></symbol>
      <symbol id="i-cloud" viewBox="0 0 24 24"><path d="M7 18h10a3.5 3.5 0 0 0 .3-7 5 5 0 0 0-9.6-1.4A3.8 3.8 0 0 0 7 18z"/></symbol>
      <symbol id="i-speech" viewBox="0 0 24 24"><path d="M4 5a1 1 0 0 1 1-1h14a1 1 0 0 1 1 1v8a1 1 0 0 1-1 1H9l-4 4v-4H5a1 1 0 0 1-1-1z"/></symbol>
      <symbol id="i-callout" viewBox="0 0 24 24"><path d="M4 4h16v10h-9l-3 4v-4H4z"/></symbol>
      <symbol id="i-tooltip" viewBox="0 0 24 24"><path d="M5 5h14a1 1 0 0 1 1 1v7a1 1 0 0 1-1 1h-5l-2 3-2-3H5a1 1 0 0 1-1-1V6a1 1 0 0 1 1-1z"/></symbol>
    </defs>
  </svg>

  <!-- ================= top bar ================= -->
  <header id="topbar">
    <div class="tb-left">
      <span class="brand"><svg class="ic"><use href="#i-pen"/></svg>Puff PDF</span>
      <button id="btn-open" class="btn" data-tip="Open a PDF (or drag one onto the page)"><svg class="ic"><use href="#i-open"/></svg><span>Open</span></button>
      <span id="doc-name" class="doc-name"></span>
    </div>

    <div class="tb-right">
      <button id="btn-undo" class="icon-btn" data-tip="Undo (Ctrl+Z)"><svg class="ic"><use href="#i-undo"/></svg></button>
      <button id="btn-redo" class="icon-btn" data-tip="Redo (Ctrl+Y)"><svg class="ic"><use href="#i-redo"/></svg></button>

      <span class="vr"></span>

      <div class="ocr-wrap">
        <button id="btn-ocr" class="btn ghost" data-tip="Recognize text on the current page so a scanned PDF becomes selectable"><svg class="ic"><use href="#i-ocr"/></svg><span>OCR page</span></button>
        <button id="btn-ocr-all" class="btn ghost slim" data-tip="OCR every page (runs in background, cancellable)">All</button>
      </div>

      <span class="vr"></span>

      <button id="btn-save" class="btn" data-tip="Save your markup for this PDF — comes back next time (Ctrl+S)"><svg class="ic"><use href="#i-save"/></svg><span>Save</span></button>
      <button id="btn-export" class="btn primary" data-tip="Download a real PDF with your markup baked in — opens anywhere (Ctrl+E)"><svg class="ic"><use href="#i-export"/></svg><span>Export PDF</span></button>

      <span class="vr"></span>

      <div class="zoom">
        <button id="btn-zoom-out" class="icon-btn" data-tip="Zoom out"><svg class="ic"><use href="#i-zoom-out"/></svg></button>
        <span id="zoom-label" class="readout">100%</span>
        <button id="btn-zoom-in" class="icon-btn" data-tip="Zoom in"><svg class="ic"><use href="#i-zoom-in"/></svg></button>
        <button id="btn-fit" class="icon-btn" data-tip="Fit page to window width"><svg class="ic"><use href="#i-fit"/></svg></button>
      </div>
      <span id="page-readout" class="readout page">— / —</span>
    </div>
  </header>

  <!-- ================= body ================= -->
  <div id="body">
    <!-- left tool rail -->
    <nav id="toolrail" aria-label="Drawing tools">
      <button class="tb-tool" data-tool="select" data-tip="Select — click a mark to move, resize (handles), or delete it (V)"><svg class="ic"><use href="#i-select"/></svg></button>
      <div class="rail-sep"></div>
      <button class="tb-tool" data-tool="pen"    data-tip="Pen — freehand solid line (P)"><svg class="ic"><use href="#i-pen"/></svg></button>
      <button class="tb-tool" data-tool="brush"  data-tip="Brush — width follows pen pressure (B)"><svg class="ic"><use href="#i-brush"/></svg></button>
      <div class="rail-sep"></div>
      <button class="tb-tool" data-tool="hltext" data-tip="Highlight text — drag across words, snaps to them (H)"><svg class="ic"><use href="#i-hltext"/></svg></button>
      <button class="tb-tool" data-tool="hlfree" data-tip="Highlighter — freehand translucent stroke (M)"><svg class="ic"><use href="#i-hlfree"/></svg></button>
      <div class="rail-sep"></div>
      <button class="tb-tool" id="btn-shapes" data-tip="Shapes — click to pick (line, arrow, rectangle, star, polygon…)"><svg class="ic"><use id="shapes-icon-use" href="#i-rect"/></svg></button>
      <div class="rail-sep"></div>
      <button class="tb-tool" data-tool="text"   data-tip="Text box — click on the page, then type (T)"><svg class="ic"><use href="#i-text"/></svg></button>
      <button class="tb-tool" data-tool="eraser" data-tip="Eraser — click or drag over marks to remove (E)"><svg class="ic"><use href="#i-eraser"/></svg></button>

      <div class="rail-grow"></div>
      <button id="btn-clear" class="icon-btn danger" data-tip="Clear all marks on the current page (undoable)"><svg class="ic"><use href="#i-trash"/></svg></button>
    </nav>

    <!-- shapes flyout -->
    <div id="shapes-flyout" class="flyout hidden">
      <button class="shape-opt" data-shape="line" title="Line"><svg class="ic"><use href="#i-line"/></svg></button>
      <button class="shape-opt" data-shape="arrow" title="Arrow"><svg class="ic"><use href="#i-arrow"/></svg></button>
      <button class="shape-opt" data-shape="dblarrow" title="Double arrow"><svg class="ic"><use href="#i-dblarrow"/></svg></button>
      <button class="shape-opt" data-shape="rect" title="Rectangle"><svg class="ic"><use href="#i-rect"/></svg></button>
      <button class="shape-opt" data-shape="rrect" title="Rounded rectangle"><svg class="ic"><use href="#i-rrect"/></svg></button>
      <button class="shape-opt" data-shape="ellipse" title="Ellipse"><svg class="ic"><use href="#i-ellipse"/></svg></button>
      <button class="shape-opt" data-shape="triangle" title="Triangle"><svg class="ic"><use href="#i-triangle"/></svg></button>
      <button class="shape-opt" data-shape="righttri" title="Right triangle"><svg class="ic"><use href="#i-righttri"/></svg></button>
      <button class="shape-opt" data-shape="diamond" title="Diamond"><svg class="ic"><use href="#i-diamond"/></svg></button>
      <button class="shape-opt" data-shape="pentagon" title="Pentagon"><svg class="ic"><use href="#i-pentagon"/></svg></button>
      <button class="shape-opt" data-shape="hexagon" title="Hexagon"><svg class="ic"><use href="#i-hexagon"/></svg></button>
      <button class="shape-opt" data-shape="star" title="Star"><svg class="ic"><use href="#i-star"/></svg></button>
      <button class="shape-opt" data-shape="plus" title="Plus / cross"><svg class="ic"><use href="#i-plus"/></svg></button>
      <button class="shape-opt" data-shape="parallelogram" title="Parallelogram"><svg class="ic"><use href="#i-parallelogram"/></svg></button>
      <button class="shape-opt" data-shape="trapezoid" title="Trapezoid"><svg class="ic"><use href="#i-trapezoid"/></svg></button>
      <button class="shape-opt" data-shape="elbowarrow" title="Elbow arrow"><svg class="ic"><use href="#i-elbowarrow"/></svg></button>
      <button class="shape-opt" data-shape="curvedarrow" title="Curved arrow"><svg class="ic"><use href="#i-curvedarrow"/></svg></button>
      <button class="shape-opt" data-shape="heart" title="Heart"><svg class="ic"><use href="#i-heart"/></svg></button>
      <button class="shape-opt" data-shape="cloud" title="Cloud"><svg class="ic"><use href="#i-cloud"/></svg></button>
      <button class="shape-opt" data-shape="speech" title="Speech bubble"><svg class="ic"><use href="#i-speech"/></svg></button>
      <button class="shape-opt" data-shape="callout" title="Callout"><svg class="ic"><use href="#i-callout"/></svg></button>
      <button class="shape-opt" data-shape="tooltip" title="Tooltip"><svg class="ic"><use href="#i-tooltip"/></svg></button>
    </div>

    <!-- work area -->
    <div id="workarea">
      <!-- contextual properties for the active tool -->
      <div id="properties">
        <span id="tool-name" class="tool-name">Pen</span>
        <span class="prop-sep"></span>
        <div id="swatches"></div>
        <input type="color" id="color" value="#e11d48" data-tip="Custom color" />
        <label class="prop" id="prop-width"><span>Size</span><input type="range" id="width" min="1" max="40" value="3" /></label>
        <label class="prop" id="prop-opacity"><span>Opacity</span><input type="range" id="opacity" min="10" max="100" value="100" /></label>
        <label class="prop hidden" id="prop-font"><span class="font-ic">A</span>
          <select id="font">
            <option value="sans">Sans</option>
            <option value="serif">Serif</option>
            <option value="mono">Mono</option>
          </select>
        </label>
      </div>

      <main id="stage">
        <div id="dropzone">
          <div class="dz-inner">
            <div class="dz-icon"><svg class="ic ic-lg"><use href="#i-pen"/></svg></div>
            <h1>Mark up any PDF</h1>
            <p class="dz-lead">Draw, highlight sentences, add notes — then export a real PDF that keeps your markup anywhere.</p>
            <button id="dz-pick" class="btn primary big"><svg class="ic"><use href="#i-open"/></svg><span>Open a PDF</span></button>
            <p class="dz-sub">or drop a file here · 100% local, nothing is uploaded</p>
          </div>
        </div>
        <div id="pages"></div>
      </main>
    </div>
  </div>

  <input type="file" id="file-input" accept="application/pdf,.pdf" hidden />
  <div id="toast" class="hidden"></div>

  <script src="lib/pdf-lib.min.js"></script>
  <script src="lib/tesseract/tesseract.min.js"></script>
  <script type="module" src="src/viewer.js"></script>
</body>
</html>
